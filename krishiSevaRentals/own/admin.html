<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Page</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.1/css/all.min.css" integrity="sha512-5Hs3dF2AEPkpNAR7UiOHba+lRSJNeM2ECkwxUIxC1Q/FLycGTbNapWXB4tP889k5T5Ju8fs4b1P5z/iB4nMfSQ==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background-color: beige; /* Pearl White */
            color: #2E8B57; /* Farm Green */
        }
        h1 {
            color: #006400; /* Dark Farm Green */
            text-align: center;
        }

        h3 a{
            color: #2E8B57;
            text-decoration: none;
        }
        .machine {
            border: 2px solid #2E8B57; /* Farm Green */
            background-color: #F5F5F5; /* Pearl White */
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
            box-shadow: 0px 4px 6px rgba(0, 0, 0, 0.1);
        }
        img {
            max-width: 200px;
            display: block;
            margin-bottom: 10px;
            border: 2px solid #2E8B57;
            border-radius: 5px;
        }
        p {
            margin: 5px 0;
        }
        button {
            background-color: #006400; /* Dark Farm Green */
            color: white;
            padding: 8px 16px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background-color: #2E8B57; /* Slightly lighter green */
        }
        /* Responsive Styles */
        @media (max-width: 768px) {
            .machine {
                padding: 10px;
            }
            button {
                padding: 10px;
                font-size: 14px;
            }
            img {
                max-width: 90%; /* Shrinks images slightly for smaller screens */
            }
        }

        @media (max-width: 480px) {
            body {
                margin: 10px;
            }
            h1 {
                font-size: 24px;
            }
            .machine {
                padding: 8px;
            }
            img {
                max-width: 100%; /* Ensures images take full width on small screens */
            }
            button {
                padding: 8px;
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <h1>Admin Page</h1>
    <h3 style="position: relative; left: 10px; color: #2E8B57; text-decoration: none;"><a href="/krishiSevaRentals/home.html"><i class="fa-solid fa-house"></i>Home</a></h3>
    <div id="machineList"></div>

    <script>
        const machineList = document.getElementById("machineList");

        function loadMachines() {
            const machines = JSON.parse(localStorage.getItem("machines")) || [];
            machineList.innerHTML = "";
            machines.forEach((machine, index) => {
                const machineDiv = document.createElement("div");
                machineDiv.className = "machine";
                machineDiv.innerHTML = `
                    <p><strong>Owner Name:</strong> ${machine.ownerName}</p>
                    <img src="${machine.image}" alt="Machine Image" id="machineImage${index}">
                    <button onclick="downloadImage(${index})">Download Image</button>
                    <p><strong>Description:</strong> ${machine.description}</p>
                    <p><strong>Contact:</strong> ${machine.contactNumber}</p>
                    <button onclick="deleteMachine(${index})">Delete</button>
                `;
                machineList.appendChild(machineDiv);
            });
        }

        function downloadImage(index) {
            const imgElement = document.getElementById(`machineImage${index}`);
            const link = document.createElement("a");
            link.href = imgElement.src;
            link.download = `MachineImage${index + 1}.png`; // Default name for the downloaded image
            link.click();
        }

        function deleteMachine(index) {
            let machines = JSON.parse(localStorage.getItem("machines")) || [];
            machines.splice(index, 1);
            localStorage.setItem("machines", JSON.stringify(machines));
            loadMachines();
        }

        loadMachines();
    </script>
</body>
</html>
